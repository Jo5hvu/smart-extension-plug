<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Smart Extension Plug Controller</title>
    
    <!-- MQTT Library -->
    <script src="https://unpkg.com/mqtt@5.0.0/dist/mqtt.min.js"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 20px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .connection-status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: normal;
            background: rgba(255,255,255,0.2);
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        .status-connected .status-indicator { background-color: #4ade80; }
        .status-disconnected .status-indicator { background-color: #ef4444; }

        .plugs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .plug-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .plug-card:hover {
            transform: translateY(-5px);
        }

        .plug-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .plug-icon {
            font-size: 3em;
            color: #667eea;
        }

        .plug-status {
            font-size: 0.9em;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
        }

        .status-on {
            background: #4ade80;
            color: white;
        }

        .status-off {
            background: #9ca3af;
            color: white;
        }

        .plug-name {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .plug-location {
            color: #666;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.4s;
            border-radius: 34px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: #667eea;
        }

        input:checked + .toggle-slider:before {
            transform: translateX(26px);
        }

        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 20px;
        }

        .toggle-label {
            font-weight: bold;
            color: #333;
        }

        .control-panel {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-top: 20px;
        }

        .control-panel h3 {
            margin-bottom: 20px;
            color: #333;
        }

        .master-controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .master-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-all-on {
            background: #4ade80;
            color: white;
        }

        .btn-all-off {
            background: #ef4444;
            color: white;
        }

        .settings-panel {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-top: 20px;
        }

        .settings-panel h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .settings-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .settings-form input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9em;
        }

        .settings-form button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .settings-form button:hover {
            background: #5a67d8;
        }

        .log-panel {
            background: rgba(0,0,0,0.8);
            color: #4ade80;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            max-height: 200px;
            overflow-y: auto;
        }

        .log-panel h4 {
            color: white;
            margin-bottom: 10px;
        }

        .log-entry {
            margin: 5px 0;
            border-left: 2px solid #4ade80;
            padding-left: 10px;
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 1.5em; }
            .plugs-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-plug"></i>
                Smart Extension Plug Controller
                <span id="connection-status" class="connection-status status-disconnected">
                    <span class="status-indicator"></span>
                    Disconnected
                </span>
            </h1>
            <p>Control your devices from anywhere in the world</p>
        </div>

        <div class="plugs-grid" id="plugs-grid">
            <!-- Socket 1 -->
            <div class="plug-card" data-socket="1">
                <div class="plug-header">
                    <i class="fas fa-laptop plug-icon"></i>
                    <span class="plug-status" id="status-badge-1">OFF</span>
                </div>
                <div class="plug-name">Socket 1</div>
                <div class="plug-location"><i class="fas fa-map-marker-alt"></i> Workstation</div>
                <div class="toggle-container">
                    <span class="toggle-label"><i class="fas fa-power-off"></i> Power Control</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="toggle-1" data-socket="1">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>

            <!-- Socket 2 -->
            <div class="plug-card" data-socket="2">
                <div class="plug-header">
                    <i class="fas fa-fan plug-icon"></i>
                    <span class="plug-status" id="status-badge-2">OFF</span>
                </div>
                <div class="plug-name">Socket 2</div>
                <div class="plug-location"><i class="fas fa-map-marker-alt"></i> Desk Area</div>
                <div class="toggle-container">
                    <span class="toggle-label"><i class="fas fa-power-off"></i> Power Control</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="toggle-2" data-socket="2">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>

            <!-- Socket 3 -->
            <div class="plug-card" data-socket="3">
                <div class="plug-header">
                    <i class="fas fa-mobile-alt plug-icon"></i>
                    <span class="plug-status" id="status-badge-3">OFF</span>
                </div>
                <div class="plug-name">Socket 3</div>
                <div class="plug-location"><i class="fas fa-map-marker-alt"></i> Charging Station</div>
                <div class="toggle-container">
                    <span class="toggle-label"><i class="fas fa-power-off"></i> Power Control</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="toggle-3" data-socket="3">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <div class="control-panel">
            <h3><i class="fas fa-sliders-h"></i> Master Controls</h3>
            <div class="master-controls">
                <button class="master-btn btn-all-on" id="btn-all-on">
                    <i class="fas fa-toggle-on"></i> Turn All ON
                </button>
                <button class="master-btn btn-all-off" id="btn-all-off">
                    <i class="fas fa-toggle-off"></i> Turn All OFF
                </button>
            </div>
        </div>

        <div class="settings-panel">
            <h3><i class="fas fa-network-wired"></i> MQTT Connection Settings</h3>
            <div class="settings-form">
                <input type="text" id="mqtt-broker" placeholder="Broker URL" value="ws://broker.hivemq.com:8000/mqtt">
                <input type="text" id="mqtt-client-id" placeholder="Client ID" value="dashboard_client">
                <button id="btn-connect-mqtt">Connect to MQTT Broker</button>
                <button id="btn-disconnect-mqtt">Disconnect</button>
            </div>
        </div>

        <div class="log-panel">
            <h4><i class="fas fa-terminal"></i> Event Log</h4>
            <div id="log-entries"></div>
        </div>
    </div>

    <script>
        let mqttClient = null;
        let isSimulationMode = true;
        
        const TOPICS = {
            COMMAND: (socket) => `home/extension-plug/socket${socket}/command`,
            STATE: (socket) => `home/extension-plug/socket${socket}/state`,
            ALL_COMMAND: "home/extension-plug/all/command"
        };
        
        let relayStates = {1: false, 2: false, 3: false};
        
        function updateUI(socket, state) {
            const toggle = document.getElementById(`toggle-${socket}`);
            const statusBadge = document.getElementById(`status-badge-${socket}`);
            
            if (toggle) toggle.checked = state;
            if (statusBadge) {
                statusBadge.textContent = state ? "ON" : "OFF";
                statusBadge.className = `plug-status ${state ? 'status-on' : 'status-off'}`;
            }
        }
        
        function addLogEntry(message, type = "info") {
            const logDiv = document.getElementById("log-entries");
            const timestamp = new Date().toLocaleTimeString();
            const icon = type === "error" ? "❌" : (type === "success" ? "✅" : "📡");
            const entry = document.createElement("div");
            entry.className = "log-entry";
            entry.innerHTML = `[${timestamp}] ${icon} ${message}`;
            logDiv.insertBefore(entry, logDiv.firstChild);
            
            while (logDiv.children.length > 20) {
                logDiv.removeChild(logDiv.lastChild);
            }
        }
        
        function updateConnectionStatus(connected) {
            const statusSpan = document.getElementById("connection-status");
            if (connected) {
                statusSpan.className = "connection-status status-connected";
                statusSpan.innerHTML = '<span class="status-indicator"></span> MQTT Connected';
                addLogEntry("Connected to MQTT broker", "success");
                isSimulationMode = false;
            } else {
                statusSpan.className = "connection-status status-disconnected";
                statusSpan.innerHTML = '<span class="status-indicator"></span> Disconnected';
                isSimulationMode = true;
            }
        }
        
        function setRelay(socket, state) {
            relayStates[socket] = state;
            updateUI(socket, state);
            
            const command = state ? "ON" : "OFF";
            
            if (!isSimulationMode && mqttClient && mqttClient.connected) {
                mqttClient.publish(TOPICS.COMMAND(socket), command);
                addLogEntry(`Published to ${TOPICS.COMMAND(socket)}: ${command}`);
            } else {
                addLogEntry(`[SIMULATION] Socket ${socket} turned ${command}`, "info");
            }
        }
        
        function setAllRelays(state) {
            for (let i = 1; i <= 3; i++) {
                setRelay(i, state);
            }
            addLogEntry(`All sockets turned ${state ? "ON" : "OFF"}`);
            
            if (!isSimulationMode && mqttClient && mqttClient.connected) {
                mqttClient.publish(TOPICS.ALL_COMMAND, state ? "ON" : "OFF");
            }
        }
        
        function connectMQTT() {
            const brokerUrl = document.getElementById("mqtt-broker").value;
            let clientId = document.getElementById("mqtt-client-id").value;
            
            if (!brokerUrl) {
                addLogEntry("Please enter a broker URL", "error");
                return;
            }
            
            if (!clientId || clientId === "dashboard_client") {
                clientId = `dashboard_${Math.random().toString(36).substr(2, 8)}`;
                document.getElementById("mqtt-client-id").value = clientId;
            }
            
            addLogEntry(`Connecting to ${brokerUrl}...`);
            
            try {
                mqttClient = mqtt.connect(brokerUrl, {
                    clientId: clientId,
                    keepalive: 60,
                    clean: true,
                    reconnectPeriod: 5000
                });
                
                mqttClient.on("connect", () => {
                    addLogEntry(`Connected!`, "success");
                    updateConnectionStatus(true);
                    
                    for (let i = 1; i <= 3; i++) {
                        mqttClient.subscribe(TOPICS.STATE(i));
                        addLogEntry(`Subscribed to ${TOPICS.STATE(i)}`);
                    }
                });
                
                mqttClient.on("message", (topic, message) => {
                    const msgStr = message.toString();
                    addLogEntry(`Received on ${topic}: ${msgStr}`);
                    
                    for (let i = 1; i <= 3; i++) {
                        if (topic === TOPICS.STATE(i)) {
                            const newState = msgStr === "ON";
                            if (relayStates[i] !== newState) {
                                relayStates[i] = newState;
                                updateUI(i, newState);
                            }
                            break;
                        }
                    }
                });
                
                mqttClient.on("error", (err) => {
                    addLogEntry(`Error: ${err.message}`, "error");
                    updateConnectionStatus(false);
                });
                
                mqttClient.on("close", () => {
                    addLogEntry("Connection closed", "info");
                    updateConnectionStatus(false);
                });
                
            } catch (error) {
                addLogEntry(`Failed: ${error.message}`, "error");
                updateConnectionStatus(false);
            }
        }
        
        function disconnectMQTT() {
            if (mqttClient) {
                mqttClient.end();
                mqttClient = null;
                addLogEntry("Disconnected");
                updateConnectionStatus(false);
            }
        }
        
        function setupEventListeners() {
            for (let i = 1; i <= 3; i++) {
                const toggle = document.getElementById(`toggle-${i}`);
                if (toggle) {
                    toggle.addEventListener("change", (e) => {
                        const socket = parseInt(e.target.dataset.socket);
                        setRelay(socket, e.target.checked);
                    });
                }
            }
            
            document.getElementById("btn-all-on").addEventListener("click", () => setAllRelays(true));
            document.getElementById("btn-all-off").addEventListener("click", () => setAllRelays(false));
            document.getElementById("btn-connect-mqtt").addEventListener("click", connectMQTT);
            document.getElementById("btn-disconnect-mqtt").addEventListener("click", disconnectMQTT);
        }
        
        function init() {
            setupEventListeners();
            updateConnectionStatus(false);
            addLogEntry("Dashboard ready - using ws://broker.hivemq.com:8000", "info");
            addLogEntry("Click 'Connect to MQTT Broker' to connect", "info");
            
            for (let i = 1; i <= 3; i++) {
                updateUI(i, false);
            }
        }
        
        init();
    </script>
</body>
</html>
